<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Aüeio Player</title>
  <link rel="stylesheet" href="styles/main.css" />
</head>
<body>

  <!-- ── Top navigation bar ─────────────────────────────────── -->
  <header id="topbar">
    <span id="app-title">Aüeio</span>
    <button id="nav-library" class="active" data-nav="library">Library</button>
    <button id="nav-settings" data-nav="settings">Settings</button>
  </header>

  <!-- ── Views container ────────────────────────────────────── -->
  <main id="views">

    <!-- Library View -->
    <section id="library-view" data-view="library" class="active">
      <div id="library-toolbar">
        <input
          id="search-input"
          type="search"
          placeholder="Search tracks…"
          aria-label="Search tracks"
        />
        <span id="track-count"></span>
      </div>

      <!-- Body: tree panel + table -->
      <div id="library-body">

        <!-- Foldable tree panel (left sidebar) -->
        <aueio-tree-panel id="library-tree"></aueio-tree-panel>

        <!-- Table wrapper -->
        <div id="library-table-wrapper">

          <!-- Loading overlay -->
          <div id="loading-overlay">
            <div class="spinner" aria-hidden="true"></div>
            <span>Scanning library…</span>
          </div>

          <!-- Empty state -->
          <div id="library-empty" hidden>
            <div class="empty-icon" aria-hidden="true">🎵</div>
            <p class="empty-title">No tracks yet</p>
            <p class="empty-hint">Add music folders in Settings to get started</p>
            <button id="empty-goto-settings" data-variant="primary" data-size="sm">
              Open Settings
            </button>
          </div>

          <!-- Sort header row -->
          <div id="library-header-row" role="row" aria-label="Sort columns">
            <aueio-sort-header sort-key="title" sort-dir="asc"></aueio-sort-header>
          </div>

          <!-- Track list (CSS grid) -->
          <div
            id="track-list"
            role="grid"
            aria-label="Music library"
            hidden
          ></div>

        </div><!-- /library-table-wrapper -->
      </div><!-- /library-body -->

    </section>

    <!-- Settings View -->
    <section id="settings-view" data-view="settings">
      <div id="settings-content">

        <div class="settings-section">
          <h2 class="settings-section-title">Music Library Folders</h2>
          <div id="folder-list" data-stack="sm"></div>
          <button id="add-folder-btn" data-variant="primary" data-size="sm">
            + Add Folder
          </button>
        </div>

        <div class="settings-section">
          <h2 class="settings-section-title">Playback</h2>
          <div class="settings-row">
            <label for="settings-volume">Default Volume</label>
            <input
              id="settings-volume"
              type="range"
              min="0" max="1" step="0.05" value="1"
              aria-label="Default volume"
            />
          </div>
        </div>

        <div class="settings-section">
          <h2 class="settings-section-title">Appearance</h2>
          <div class="settings-row">
            <label for="settings-theme">Theme</label>
            <select id="settings-theme" aria-label="Select theme">
              <option value="dark">Dark</option>
              <option value="light">Light</option>
              <option value="solarized">Solarized</option>
              <option value="nord">Nord</option>
            </select>
          </div>
        </div>

      </div>
    </section>

  </main>

  <!-- ── Now Playing expanded (overlay) ─────────────────────── -->
  <section id="now-playing-view" role="region" aria-label="Now Playing">
    <!-- Blurred album background -->
    <div id="np-bg" aria-hidden="true"></div>
    <div id="np-bg-color" aria-hidden="true"></div>

    <!-- Back button -->
    <button id="np-back-btn" aria-label="Close Now Playing">←</button>

    <!-- Main content -->
    <div id="np-content">

      <!-- Album art -->
      <div id="np-album-art" aria-hidden="true">
        <span id="np-album-art-title">🎵</span>
      </div>

      <!-- Track info -->
      <div id="np-track-info">
        <div id="np-track-info-bg" aria-hidden="true"></div>
        <div id="np-title" data-truncate></div>
        <div id="np-artist"></div>
      </div>

      <!-- Extended tags display -->
      <div id="np-tags" aria-label="Track metadata" class="np-tags-row"></div>

      <!-- Waveform progress -->
      <div id="np-waveform-container" role="slider"
           aria-label="Playback position"
           aria-valuemin="0" aria-valuemax="100" aria-valuenow="0">
        <canvas id="np-waveform-canvas" height="80"></canvas>
        <div id="np-time-row">
          <span id="np-current-time">0:00</span>
          <span id="np-duration">0:00</span>
        </div>
      </div>

      <!-- Controls -->
      <div id="np-controls">
        <button id="np-prev-btn" data-icon aria-label="Previous track">⏮</button>
        <button id="np-play-btn" data-icon aria-label="Play / Pause">▶</button>
        <button id="np-next-btn" data-icon aria-label="Next track">⏭</button>
      </div>

      <!-- Volume -->
      <div id="np-volume-row">
        <span class="volume-icon" aria-hidden="true">🔈</span>
        <input
          id="np-volume"
          type="range"
          min="0" max="1" step="0.01" value="1"
          aria-label="Volume"
        />
        <span class="volume-icon" aria-hidden="true">🔊</span>
      </div>

    </div>
  </section>

  <!-- ── Now Playing bottom bar ──────────────────────────────── -->
  <footer id="now-playing-bar" hidden aria-label="Now Playing mini player">
    <div id="np-bar-album" aria-hidden="true">
      <span id="np-bar-album-icon">🎵</span>
    </div>

    <div id="np-bar-info">
      <div id="np-bar-title" data-truncate></div>
      <div id="np-bar-artist" data-truncate></div>
    </div>

    <canvas id="np-bar-waveform" height="40" aria-hidden="true"></canvas>

    <div id="np-bar-controls">
      <button id="np-bar-prev-btn" data-icon aria-label="Previous">⏮</button>
      <button id="np-bar-play-btn" data-icon aria-label="Play / Pause">▶</button>
      <button id="np-bar-next-btn" data-icon aria-label="Next">⏭</button>
    </div>

    <button id="np-bar-expand" aria-label="Expand now playing" title="Expand">⌃</button>
  </footer>

  <!-- ── Tag editor dialog ───────────────────────────────────── -->
  <aueio-tag-dialog id="library-tag-dialog"></aueio-tag-dialog>

  <script type="module" src="index.js"></script>
</body>
</html>
